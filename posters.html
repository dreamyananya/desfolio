/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
    grid-auto-rows:150px;
    grid-auto-flow:dense;
}

/* GRID ITEM */
.grid-item{
    position:relative;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;

    transition:
        transform .45s ease,
        opacity .4s ease,
        box-shadow .45s ease;

    background:#ddd;
}

/* IMAGE */
.grid-item img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;

    transition:
        transform .45s ease,
        width .45s ease,
        height .45s ease;
}

/* DIM OTHER ITEMS */
.grid:hover .grid-item{
    opacity:.45;
    transform:scale(.96);
}

/* ACTIVE HOVER CARD */
.grid .grid-item:hover{

    opacity:1;
    z-index:999;

    overflow:visible;

    transform:scale(1.08);

    width:max-content;
    height:max-content;

    max-width:450px;
    max-height:650px;

    padding:10px;

    /*background:#fff;*/

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:26px;

   /* box-shadow:
        0 30px 70px rgba(0,0,0,.35);*/
}

/* IMAGE RETURNS TO ORIGINAL RATIO */
.grid .grid-item:hover img{

    width:auto;
    height:auto;

    max-width:420px;
    max-height:620px;

    object-fit:contain;

    border-radius:18px;

   /* background:#fff;
*/
    transform:none;
}

/* LIGHT OVERLAY */
.grid-item::after{
    content:"";
    position:absolute;
    inset:0;
    /*background:rgba(255,255,255,0);*/
    transition:.35s ease;
    pointer-events:none;
    border-radius:inherit;
}

/*.grid-item:hover::after{
    background:rgba(255,255,255,.04);
}*/
