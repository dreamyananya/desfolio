<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Masonry Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 40px;
            color: #333;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            grid-auto-rows: 150px;
            grid-auto-flow: dense;
        }

        .grid-item {
            background: linear-gradient(135deg, #ddd 0%, #ccc 100%);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .grid-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Varying spans to create masonry effect */
        .grid-item:nth-child(1) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(2) { grid-column: span 1; grid-row: span 2; }
        .grid-item:nth-child(3) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(4) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(5) { grid-column: span 1; grid-row: span 2; }
        .grid-item:nth-child(6) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(7) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(8) { grid-column: span 1; grid-row: span 2; }
        .grid-item:nth-child(9) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(10) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(11) { grid-column: span 1; grid-row: span 2; }
        .grid-item:nth-child(12) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(13) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(14) { grid-column: span 1; grid-row: span 2; }
        .grid-item:nth-child(15) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(16) { grid-column: span 1; grid-row: span 1; }

        .grid-item:nth-child(21) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(22) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(23) { grid-column: span 1; grid-row: span 2; }

        .grid-item:nth-child(32) { grid-column: span 1; grid-row: span 2; }
        .grid-item:nth-child(33) { grid-column: span 1; grid-row: span 1; }

        .grid-item:nth-child(40) { grid-column: span 1; grid-row: span 1; }
        .grid-item:nth-child(41) { grid-column: span 1; grid-row: span 2; }

        /* Responsive for tablets */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
                grid-auto-rows: 120px;
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                grid-auto-rows: 100px;
            }

            .grid-item:nth-child(n) { grid-row: span 1 !important; }
        }
    </style>
</head>
